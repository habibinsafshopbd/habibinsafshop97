<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#fff;
    padding:25px;
    border-radius:10px;
    width:320px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#006B3C;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#006B3C;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="login-box">

<h2>🔐 Admin Login</h2>

<input type="email" id="email" placeholder="ইমেইল">

<input type="password" id="password" placeholder="পাসওয়ার্ড">

<button onclick="login()">Login</button>

</div>

<script>
function login(){
alert("এখানে Firebase Authentication যুক্ত করতে হবে।");
}
</script>

</body>
</html>
